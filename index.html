<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppBuilder Pro + IA Control</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        header { background: #020617; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #334155; color: var(--primary); }
        nav { display: flex; background: #1e293b; }
        nav button { flex: 1; padding: 12px; border: none; background: none; color: #94a3b8; cursor: pointer; }
        nav button.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .container { padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px #000; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <header>AppBuilder Pro + IA Control</header>
    <nav>
        <button class="active">Criar App</button>
        <button>Meus Projetos</button>
        <button>Configurações</button>
    </nav>
    <div class="container">
        <div class="card">
            <h3>Novo Projeto</h3>
            <label>Nome do App:</label>
            <input type="text" placeholder="Ex: Meu App de Vendas">
            <label>Tipo de App:</label>
            <select>
                <option>E-commerce</option>
                <option>Delivery</option>
                <option>Gestão</option>
                <option>Portfólio</option>
            </select>
            <button class="btn-main">GERAR INTERFACE COM IA</button>
        </div>
    </div>
</body>
</html>
